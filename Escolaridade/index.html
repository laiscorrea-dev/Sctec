<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Principal</title>

</head>

<body>
    <header>
        <h2>Inscrição Escolar<h2>
                <nav>
                    <ul>
                        <li> <a href="#inscricao">Inscrição</a></li>
                        <li> <a href="#materia">Matéria</a> </li>
                        <li> <a href="#escolaridade">Nível Escolariade</a></li>
                        <li><a href="#descricao">Descrição</a></li>
                    </ul>
                </nav>
    </header>

    <footer>
        <section id="inscricao">
             <h3>Inscrição</h3>
             <form>
                <label for="name">Nome Completo: </label>
                <input type="text" id="nome" name="nome" required>
                <br>
                <label for="email">E-mail: </label>
                <input type="email" id="email" name="email" required>
                <br>
                <label for="idade">Idade: </label>
                <input type="text" id="idade" name="idade" required>
                </section>
                <br>
                <section id="materia">
                <label for="materia">Matéria</label>
                <select name="materia" id="materia">
                    <option value="matematica"> Matemática </option>
                    <option value="portugues"> Português </option>
                    <option value="bilogia"> Biologia </option>
                    <option value="ciencias">  Ciências</option>
                    <option value="historia"> História</option>
                    <option value="geografia"> Geografia</option>
                    <option value="artes"> Artes</option>
                </select>
                </section>
                <br>
                <section id="escolariade">
                <label for="Escolariade">Nível Escolaridade</label>
                <select name="Escolariade" id="Escolaridade">
                    <option value="superior">Ensino Superior Completo</option>
                    <option value="cursandome">Cursando Mestrado</option>
                    <option value="mestrado">Mestrado Completo</option>
                    <option value="cursandodou">Cursando Doutorado</option>
                    <option value="doutorado">Doutorado Completo</option>
                </select>
                </section>
                <br>
                <section id="descricao">
                <label for="mensagem">Descrição </label>
                <textarea name="memsagem" id="mensagem" cols="25" rows="3"></textarea>
                </section>
                <br>
                <input type="submit" value="Enviar mensagem" >
             </form>
    </footer>



</section>
</body>

</html>
